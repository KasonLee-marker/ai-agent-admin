spring:
  application:
    name: ai-agent-admin
  profiles:
    active: dev

  # Database Configuration (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/admindb
    driver-class-name: org.postgresql.Driver
    username: adminuser
    password: adminpass123

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # H2 Console (disabled - using PostgreSQL)
  h2:
    console:
      enabled: false
      path: /h2-console

  # Spring AI Configuration (阿里云 DashScope)
  ai:
    openai:
      base-url: https://coding.dashscope.aliyuncs.com/v1
      api-key: ${ANTHROPIC_AUTH_TOKEN}
      chat:
        options:
          model: claude-3-5-sonnet-20241022

# Jasypt Configuration
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:default-password-change-in-production}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    key-obtention-iterations: 1000
    pool-size: 1
    provider-name: SunJCE
    salt-generator-classname: org.jasypt.salt.RandomSaltGenerator
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator
    string-output-type: base64

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /

# Logging
logging:
  level:
    com.aiagent.admin: DEBUG
    org.springframework.web: INFO
    org.springframework.ai: WARN

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized